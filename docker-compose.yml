services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: sigesa
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: sigesa
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL","pg_isready -U sigesa"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    depends_on:
      - db
    environment:
      SPRING_PROFILES_ACTIVE: postgres
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/sigesa
      SPRING_DATASOURCE_USERNAME: sigesa
      SPRING_DATASOURCE_PASSWORD: pass
      APP_REPORTS_EXPORT_DIR: /tmp/sigesa-exports
    ports:
      - "8080:8080"
    volumes:
      - ./target:/workspace/target
      - exports:/tmp/sigesa-exports

volumes:
  pgdata:
  exports:
