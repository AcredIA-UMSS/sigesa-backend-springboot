spring:
  application:
    name: sigesa
  datasource:
    url: jdbc:h2:mem:sigesa;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: create-drop # Esto crea las tablas automáticamente basadas en tus @Entity
    show-sql: false
    # ELIMINA ESTA LÍNEA O PONLA EN FALSE:
    defer-datasource-initialization: false
    properties:
      hibernate:
        format_sql: true
  sql:
    init:
      # Si tienes un data.sql, este modo lo ejecutará SIEMPRE después de que Hibernate cree las tablas
      mode: never