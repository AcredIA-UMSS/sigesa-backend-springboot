spring:
  config:
    activate:
      on-profile: test
  datasource:
    url: jdbc:h2:mem:sigesa-test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
  jpa:
    hibernate:
      ddl-auto: create-drop
    defer-datasource-initialization: false
  sql:
    init:
      mode: never

sigesa:
  jwt:
    secret: "sigesa-test-jwt-secret-key-minimum-256-bits-required-for-hmac-sha256"
    expiration-seconds: 3600

app:
  reports:
    export-dir: ${java.io.tmpdir}/sigesa-exports-test
