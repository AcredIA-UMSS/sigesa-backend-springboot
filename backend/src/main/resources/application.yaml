spring:
  application:
    name: sigesa
  devtools:
    restart:
      poll-interval: 2s
      quiet-period: 1s
  datasource:
    url: jdbc:h2:mem:sigesa;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: false
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    defer-datasource-initialization: false
    properties:
      hibernate:
        format_sql: true
  sql:
    init:
      mode: never
  flyway:
    enabled: false
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 55MB

sigesa:
  jwt:
    secret: ${SIGESA_JWT_SECRET:sigesa-dev-jwt-secret-key-minimum-256-bits-required-for-hmac-sha256}
    expiration-seconds: ${SIGESA_JWT_EXPIRATION_SECONDS:86400}
  report:
    storage-path: ${SIGESA_REPORT_STORAGE_PATH:./data/reports}
  evidence:
    storage-path: ${SIGESA_EVIDENCE_STORAGE_PATH:./data/evidences}
    async-threshold-bytes: ${SIGESA_EVIDENCE_ASYNC_THRESHOLD:5242880}
